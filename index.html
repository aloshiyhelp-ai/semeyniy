<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durger King</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-900 text-white p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6">Durger King</h1>
        
        <div id="menu" class="grid grid-cols-1 gap-4 mb-20">
            <div class="bg-gray-800 p-3 rounded-xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold">Burger</h3>
                    <p class="text-orange-400">$4.99</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changeCount('Burger', 4.99, -1)" class="bg-red-500 px-3 py-1 rounded-lg">-</button>
                    <span id="count-Burger" class="font-bold">0</span>
                    <button onclick="changeCount('Burger', 4.99, 1)" class="bg-orange-500 px-3 py-1 rounded-lg">+</button>
                </div>
            </div>
            
            <div class="bg-gray-800 p-3 rounded-xl flex items-center justify-between">
                <div>
                    <h3 class="font-bold">Fries</h3>
                    <p class="text-orange-400">$1.49</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="changeCount('Fries', 1.49, -1)" class="bg-red-500 px-3 py-1 rounded-lg">-</button>
                    <span id="count-Fries" class="font-bold">0</span>
                    <button onclick="changeCount('Fries', 1.49, 1)" class="bg-orange-500 px-3 py-1 rounded-lg">+</button>
                </div>
            </div>
        </div>

        <button id="view-order" onclick="checkout()" 
                class="fixed bottom-4 left-4 right-4 bg-green-600 py-4 rounded-xl font-bold text-lg shadow-xl hidden">
            VIEW ORDER
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let cart = {};

        function changeCount(name, price, delta) {
            if (!cart[name]) cart[name] = { count: 0, price: price };
            cart[name].count += delta;
            
            if (cart[name].count <= 0) delete cart[name];
            
            document.getElementById(`count-${name}`).innerText = cart[name] ? cart[name].count : 0;
            updateButton();
        }

        function updateButton() {
            let totalItems = Object.values(cart).reduce((sum, item) => sum + item.count, 0);
            let btn = document.getElementById('view-order');
            if (totalItems > 0) {
                btn.classList.remove('hidden');
                btn.innerText = "VIEW ORDER (" + totalItems + ")";
            } else {
                btn.classList.add('hidden');
            }
        }

        function checkout() {
            let orderData = Object.keys(cart).map(name => ({
                name: name,
                price: cart[name].price * cart[name].count,
                count: cart[name].count
            }));
            
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }
    </script>
</body>
</html>
