<!DOCTYPE html>
<html>
<head>
    <title>DurgerKing</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        h1 {
            color: #ff6b35;
            text-align: center;
        }
        .menu-item {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
        }
        .price {
            color: #ff6b35;
            font-weight: bold;
        }
        button {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍔 DurgerKing</h1>
        <p>Eng mazali burgerlar!</p>
        
        <div class="menu-item">
            <strong>🍔 Durger Burger</strong>
            <span class="price">25,000 so'm</span>
        </div>
        <div class="menu-item">
            <strong>🍟 Frish Fries</strong>
            <span class="price">8,000 so'm</span>
        </div>
        <div class="menu-item">
            <strong>🥤 Coca-Cola</strong>
            <span class="price">5,000 so'm</span>
        </div>
        
        <button onclick="window.open('https://t.me/durgerking_bot')">
            Telegram Botga o'tish
        </button>
    </div>
</body>
</html>
