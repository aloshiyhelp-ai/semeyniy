<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .product-card { background: #1f2937; border-radius: 1rem; padding: 10px; text-align: center; }
        .add-btn { background: #f59e0b; width: 100%; padding: 8px; border-radius: 0.5rem; font-weight: bold; }
        .counter-btn { background: #374151; padding: 5px 15px; border-radius: 0.5rem; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-950 text-white p-4">
    <h1 class="text-2xl font-bold text-center mb-6">Durger King</h1>

    <div id="menu" class="grid grid-cols-2 gap-4 mb-24"></div>

    <button id="view-order" onclick="showOrder()" 
            class="fixed bottom-4 left-4 right-4 bg-green-600 py-4 rounded-xl font-bold text-lg hidden shadow-2xl">
        VIEW ORDER
    </button>

    <script>
        const menuItems = [
            {name: "Cake", price: 1.00, emoji: "🍰"}, {name: "Burger", price: 4.99, emoji: "🍔"},
            {name: "Fries", price: 1.49, emoji: "🍟"}, {name: "Hotdog", price: 3.49, emoji: "🌭"},
            {name: "Taco", price: 3.99, emoji: "🌮"}, {name: "Pizza", price: 7.99, emoji: "🍕"},
            {name: "Donut", price: 1.49, emoji: "🍩"}, {name: "Popcorn", price: 1.99, emoji: "🍿"},
            {name: "Coke", price: 1.49, emoji: "🥤"}, {name: "Icecream", price: 5.99, emoji: "🍦"},
            {name: "Cookie", price: 3.99, emoji: "🍪"}, {name: "Flan", price: 7.99, emoji: "🍮"}
        ];

        let cart = {};
        let tg = window.Telegram.WebApp;
        tg.expand();

        function renderMenu() {
            const menuDiv = document.getElementById('menu');
            menuDiv.innerHTML = menuItems.map(item => `
                <div class="product-card">
                    <div class="text-4xl mb-2">${item.emoji}</div>
                    <h3 class="font-bold text-sm">${item.name}</h3>
                    <p class="text-orange-400 text-xs mb-2">$${item.price}</p>
                    <div id="btn-${item.name}">
                        ${!cart[item.name] ? 
                            `<button onclick="add('${item.name}', ${item.price})" class="add-btn">ADD</button>` :
                            `<div class="flex justify-between items-center bg-gray-700 rounded-lg p-1">
                                <button onclick="update('${item.name}', -1)" class="px-3">-</button>
                                <span>${cart[item.name].count}</span>
                                <button onclick="update('${item.name}', 1)" class="px-3">+</button>
                            </div>`
                        }
                    </div>
                </div>
            `).join('');
            
            const total = Object.values(cart).reduce((s, i) => s + i.count, 0);
            const btn = document.getElementById('view-order');
            btn.classList.toggle('hidden', total === 0);
            btn.innerText = `VIEW ORDER (${total})`;
        }

        // ... add, update, showOrder funksiyalari avvalgidek ...
    </script>
</body>
</html>
