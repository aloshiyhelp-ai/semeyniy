<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durger King Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center mb-6 text-orange-600">🍔 Durger King Menyusi</h1>
        
        <div class="grid grid-cols-1 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-lg flex justify-between items-center">
                <div>
                    <h3 class="font-bold">Double Cheeseburger</h3>
                    <p class="text-gray-500 text-sm">45,000 so'm</p>
                </div>
                <button onclick="addToOrder('Double Cheeseburger', 45000)" 
                        class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold">
                    +
                </button>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-lg flex justify-between items-center">
                <div>
                    <h3 class="font-bold">Crispy Chicken</h3>
                    <p class="text-gray-500 text-sm">38,000 so'm</p>
                </div>
                <button onclick="addToOrder('Crispy Chicken', 38000)" 
                        class="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold">
                    +
                </button>
            </div>
        </div>

        <button onclick="checkout()" 
                class="w-full mt-8 bg-green-600 text-white py-3 rounded-xl font-bold text-lg shadow-xl">
            Buyurtmani tasdiqlash
        </button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let cart = [];

        function addToOrder(name, price) {
            cart.push({name, price});
            // Foydalanuvchiga qo'shilganini bildirish
            tg.HapticFeedback.impactOccurred('light'); 
            alert(name + " savatga qo'shildi!");
        }

        function checkout() {
            if (cart.length === 0) {
                alert("Savat bo'sh!");
                return;
            }
            tg.sendData(JSON.stringify(cart));
            tg.close();
        }
    </script>
</body>
</html>
